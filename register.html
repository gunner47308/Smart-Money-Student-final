<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>สมัครสมาชิก</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/mobile.css"></head><body><main class="app-shell auth"><a class="back" href="login.html">←</a><div class="auth-art small">🪙</div><h1>สมัครสมาชิก</h1><p class="muted">เริ่มวางแผนการเงินของคุณวันนี้</p><form id="registerForm"><label>ชื่อ-นามสกุล<input name="name" placeholder="ชื่อของคุณ" required></label><label>อีเมล<input type="email" name="email" placeholder="name@email.com" required></label><label>รหัสผ่าน<input type="password" name="password" placeholder="อย่างน้อย 6 ตัวอักษร" required></label><label>ยืนยันรหัสผ่าน<input type="password" name="confirm" placeholder="••••••••" required></label><label class="check"><input type="checkbox" name="terms" required> ยอมรับเงื่อนไขการใช้งาน</label><button class="primary-btn wide">สมัครสมาชิก</button></form><p class="center">มีบัญชีแล้ว? <a href="login.html">เข้าสู่ระบบ</a></p></main><script src="js/storage.js"></script><script src="js/auth.js"></script></body></html>
