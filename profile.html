<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>โปรไฟล์</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/mobile.css"><link rel="stylesheet" href="css/additions.css"></head><body data-page="profile"><main class="app-shell page"><header class="page-header"><h2>โปรไฟล์</h2><span></span></header><section class="profile-card"><img class="app-logo profile-logo" src="assets/images/app-logo.png" alt="Smart Money Student logo"><h2 id="profileName">นักศึกษา</h2><p id="profileEmail">email@example.com</p></section><section class="settings"><label>🌐 <span id="languageLabel">ภาษาไทย</span><select id="language" onchange="SMS.setLanguage(this.value)"><option value="th">ไทย</option><option value="en">English</option></select></label><label>🌙 <span id="darkLabel">โหมดมืด</span><input id="darkMode" type="checkbox" onchange="SMS.toggleDark(this.checked)"><span></span></label><label>🎯 <span id="budgetLabel">งบประมาณรายเดือน</span><input id="budgetLimit" type="number" min="0" step="100" onchange="SMS.saveBudget(this.value)"></label><button onclick="SMS.exportData()">⇩ <span id="exportLabel">ส่งออกข้อมูล JSON</span><b>›</b></button><label class="import">⇧ <span id="importLabel">นำเข้าข้อมูล JSON</span><input type="file" accept="application/json" onchange="SMS.importData(event)"><b>›</b></label><button class="danger" onclick="SMS.clearData()">🗑 <span id="clearLabel">ลบข้อมูลทั้งหมด</span><b>›</b></button></section><button class="outline-btn wide" id="logoutLabel" onclick="SMS.logout()">ออกจากระบบ</button></main><nav class="bottom-nav"></nav><script src="js/storage.js"></script><script src="js/ui.js"></script><script src="js/app.js"></script><script src="js/additions.js"></script></body></html>
